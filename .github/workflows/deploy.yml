name: Fix and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git diff --staged --quiet || git commit -m "fix"
          git push
